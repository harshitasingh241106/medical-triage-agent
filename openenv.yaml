name: medical-triage-agent
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent reads patient symptom reports
  and must correctly triage them by department, priority, risk, and action.

author: Harshita Singh
tags:
  - medical
  - triage
  - healthcare
  - real-world
  - nlp

tasks:
  - id: task1
    name: Department Routing
    difficulty: easy
    description: Route patient to correct department
    score_range: [0.0, 1.0]

  - id: task2
    name: Department and Priority
    difficulty: medium
    description: Route patient and classify priority level
    score_range: [0.0, 1.0]

  - id: task3
    name: Full Triage
    difficulty: hard
    description: Route, classify priority, and recommend action
    score_range: [0.0, 1.0]

  - id: task4
    name: Expert Triage Officer
    difficulty: expert
    description: Route, priority, risk flag, reasoning, and action
    score_range: [0.0, 1.0]

entrypoint: environment.py
api:
  reset: /reset
  step: /step
  state: /state

observation_space:
  patient_id: string
  patient_text: string
  task_number: integer
  prompt: string
  steps_taken: integer
  done: boolean

action_space:
  response: string

reward:
  min: 0.0
  max: 1.0
  partial_credit: true